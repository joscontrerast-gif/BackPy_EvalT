services:
  mysql:
    image: mysql:8
    container_name: mysql-products
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: backend-python
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - .env
    depends_on:
      - mysql

volumes:
  mysql_data: